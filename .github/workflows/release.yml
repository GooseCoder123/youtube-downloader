name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build Executables
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
        shell: bash

      - name: Set OS Name
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            echo "OS_NAME=windows" >> $GITHUB_ENV
          elif [ "$RUNNER_OS" == "Linux" ]; then
            echo "OS_NAME=linux" >> $GITHUB_ENV
          fi
        shell: bash

      - name: Download FFmpeg (Windows)
          if: runner.os == 'Windows'
          run: |
            curl.exe -L "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -o ffmpeg.zip
            Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extracted
            $ffmpegDir = Get-ChildItem ffmpeg_extracted | Select-Object -First 1
            Move-Item "$($ffmpegDir.FullName)\bin\ffmpeg.exe" ffmpeg.exe
            Move-Item "$($ffmpegDir.FullName)\bin\ffprobe.exe" ffprobe.exe
          shell: powershell 

      - name: Download FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L "https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz" -o ffmpeg.tar.xz
          tar -xf ffmpeg.tar.xz
          mv ffmpeg-master-latest-linux64-gpl/bin/ffmpeg ffmpeg
          mv ffmpeg-master-latest-linux64-gpl/bin/ffprobe ffprobe
          chmod +x ffmpeg ffprobe

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller
          --name "yt-downloader-${{ env.VERSION }}-windows"
          --onefile
          --clean
          --add-binary "ffmpeg.exe;."
          --add-binary "ffprobe.exe;."
          downloader.py

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: >
          pyinstaller
          --name "yt-downloader-${{ env.VERSION }}-linux"
          --onefile
          --clean
          --add-binary "ffmpeg:."
          --add-binary "ffprobe:."
          downloader.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yt-downloader-${{ matrix.os }}
          path: dist/*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/**/*
